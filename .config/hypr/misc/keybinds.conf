# 🔗 https://github.com/klapptnot/dotf

$META_KEY = SUPER

# --- Gestures ---
# https://wiki.hypr.land/Configuring/Gestures/
# gesture = fingers, direction, action, options
gesture = 2, pinchin, mod: $META_KEY ALT, dispatcher, exec, dotf dispatch zoom +4
gesture = 2, pinchout, mod: $META_KEY ALT, dispatcher, exec, dotf dispatch zoom -4
gesture = 4, down, dispatcher, exec, hyprlock --grace 10
gesture = 3, up, mod: $META_KEY, dispatcher, movetoworkspace, special:miku
gesture = 3, vertical, special, miku
gesture = 3, horizontal, workspace

# https://wiki.hyprland.org/Configuring/Binds/
# bind[flags] = MODS, key, dispatcher, params

# --- System & Session ---
bind = $META_KEY, L, exec, dms ipc call lock lock # Lock session
bind = $META_KEY SHIFT, Q, exec, spawn dms ipc call powermenu toggle # Exit Hyprland
bind = $META_KEY, F1, exec, dotf-run ~/.config/hypr/bin/keybind # Show input bindings

# --- Hardware Controls ---
bindel = , XF86MonBrightnessUp, exec, dotf dispatch brightness increment 5 # Increase brightness
bindel = , XF86MonBrightnessDown, exec, dotf dispatch brightness decrement 5 # Decrease brightness
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 2 # Increase volume
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 2 # Decrease volume
bindl = , XF86AudioMute, exec, dms ipc call audio mute # Mute/Unmute
bindl = , XF86AudioPlay, exec, playerctl play-pause # Play/Pause playing media
bindl = , XF86AudioPause, exec, playerctl play-pause # Play/Pause playing media
bindl = , XF86AudioStop, exec, playerctl stop # Stop playing media
bindl = , XF86AudioNext, exec, playerctl next # Media play next
bindl = , XF86AudioPrev, exec, playerctl previous # Media play previous

# --- Screenshots & Recording ---
# trigger when the switch is turning on
# bindl = ,switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
# trigger when the switch is turning off
# bindl = ,switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1920x1080, auto, 1"

bind = $META_KEY SHIFT, X, exec, wayshot region --extract-text # Extract text from region
bind = $META_KEY SHIFT, S, exec, wayshot region # Partial selection screenshot
bind = ALT, Print, exec, wayshot window # Current window screenshot
bindl = , Print, exec, wayshot screen # Fullscreen screenshot
bind = , Pause, exec, dotf-run wfrecord screen -sa @ # Start/Stop screen recording

# --- Apps ---
# bind = ALT, Space, exec, dms ipc call spotlight toggle # Apps launcher
bind = ALT, Space, exec, vicinae toggle # Apps launcher
bind = $META_KEY, Return, exec, dotf-run kitty # Open terminal (Kitty)
bind = $META_KEY, E, exec, dotf-run ~/.config/hypr/bin/exec-gnome nautilus --new-window # Open file manager (Nautilus)
bind = $META_KEY, B, exec, dotf-run www-browser # Open default web browser
bind = $META_KEY, I, exec, dotf-run ~/.config/hypr/bin/exec-gnome gnome-control-center # Open control center (gnome)

# --- Tools & Utilities ---
bind = $META_KEY SHIFT, C, exec, hyprpicker -anl # Color picker (copy to clipboard in hex format)
# bind = $META_KEY, V, exec, dms ipc call clipboard toggle # Show/select clipboard content
bind = $META_KEY, V, exec, vicinae vicinae://launch/clipboard/history # Show/select clipboard content
bind = $META_KEY, M, exec, dms ipc call processlist focusOrToggle # Process list
bind = $META_KEY, comma, exec, dms ipc call settings focusOrToggle # Settings
bind = $META_KEY, N, exec, dms ipc call notifications toggle # Notifications
bind = $META_KEY, Y, exec, dms ipc call dankdash wallpaper # Wallpaper picker
bind = $META_KEY, TAB, exec, dms ipc call hypr toggleOverview # Toggle overview
bind = $META_KEY, period, exec, vicinae vicinae://launch/core/search-emojis # Show/select emoji
bind = $META_KEY, W, exec, dms ipc call bar toggle index 0 # Toggle bar visibility

# --- Window Management ---
bind = $META_KEY, C, killactive, # Gracefully close window
bind = $META_KEY ALT, C, exec, dotf dispatch close others # Gracefully close all other workspace windows
bind = $META_KEY, K, exec, dotf dispatch kill # Force-kill current window (warning)
bind = $META_KEY ALT, K, exec, dotf dispatch kill others # Force-kill close all other workspace windows (warning)
# ---
bind = $META_KEY, TAB, cyclenext, # Change focus to another window
# bind = $META_KEY, TAB, bringactivetotop, # Bring active window to the top (floating)
bind = $META_KEY, G, togglegroup, # Toggle tabs for a window group
# bind = $META_KEY, TAB, changegroupactive, # Change focus to another tabbed window (moved to dms ipc call hypr toggleOverview)
bind = $META_KEY, F, fullscreen, # Toggle fullscreen
bind = $META_KEY, H, exec, dotf dispatch fakefullscreen # Toggle fullscreen UI
bind = $META_KEY, T, togglefloating, # Toggle floating
bind = $META_KEY, P, pseudo, # dwindle (pseudo)
bind = $META_KEY, S, layoutmsg, togglesplit # dwindle (togglesplit)

# --- Navigation & Positioning ---
bind = $META_KEY, left, movefocus, l # Move focus left
bind = $META_KEY, right, movefocus, r # Move focus right
bind = $META_KEY, up, movefocus, u # Move focus up
bind = $META_KEY, down, movefocus, d # Move focus down

bind = $META_KEY SHIFT, left, movewindow, l # Move current window to the left
bind = $META_KEY SHIFT, right, movewindow, r # Move current window to the right
bind = $META_KEY SHIFT, up, movewindow, u # Move current window up
bind = $META_KEY SHIFT, down, movewindow, d # Move current window down

# --- Resizing ---
binde = $META_KEY CTRL, left, resizeactive, -20 0 # Resize current window -40px (horizontal)
binde = $META_KEY CTRL, right, resizeactive, 20 0 # Resize current window +40px (horizontal)
binde = $META_KEY CTRL, up, resizeactive, 0 -20 # Resize current window +40px (vertical)
binde = $META_KEY CTRL, down, resizeactive, 0 20 # Resize current window -40px (vertical)

bind = $META_KEY, grave, togglespecialworkspace # Toggle special workspace
bind = $META_KEY, 1, exec, dotf dispatch workspace name:one # Go to workspace "one"
bind = $META_KEY, 2, exec, dotf dispatch workspace name:two # Go to workspace "two"
bind = $META_KEY, 3, exec, dotf dispatch workspace name:three # Go to workspace "three"
bind = $META_KEY, 4, exec, dotf dispatch workspace name:four # Go to workspace "four"
bind = $META_KEY, 5, exec, dotf dispatch workspace name:five # Go to workspace "five"
bind = $META_KEY, 6, exec, dotf dispatch workspace name:six # Go to workspace "six"
bind = $META_KEY, 7, exec, dotf dispatch workspace name:seven # Go to workspace "seven"
bind = $META_KEY, 8, exec, dotf dispatch workspace name:eight # Go to workspace "eight"
bind = $META_KEY, 9, exec, dotf dispatch workspace name:nine # Go to workspace "nine"
bind = $META_KEY, 0, exec, dotf dispatch workspace name:ten # Go to workspace "ten"
bind = $META_KEY ALT, up,   workspace, +1 # Go to next workspace
bind = $META_KEY ALT, down, workspace, -1 # Go to previous workspace

# --- Move Window to Workspace ---
bind = $META_KEY SHIFT, grave, movetoworkspace, special # Move window to the special workspace
bind = $META_KEY SHIFT, 1, exec, dotf dispatch workspace move name:one # Move current window to workspace "one"
bind = $META_KEY SHIFT, 2, exec, dotf dispatch workspace move name:two # Move current window to workspace "two"
bind = $META_KEY SHIFT, 3, exec, dotf dispatch workspace move name:three # Move current window to workspace "three"
bind = $META_KEY SHIFT, 4, exec, dotf dispatch workspace move name:four # Move current window to workspace "four"
bind = $META_KEY SHIFT, 5, exec, dotf dispatch workspace move name:five # Move current window to workspace "five"
bind = $META_KEY SHIFT, 6, exec, dotf dispatch workspace move name:six # Move current window to workspace "six"
bind = $META_KEY SHIFT, 7, exec, dotf dispatch workspace move name:seven # Move current window to workspace "seven"
bind = $META_KEY SHIFT, 8, exec, dotf dispatch workspace move name:eight # Move current window to workspace "eight"
bind = $META_KEY SHIFT, 9, exec, dotf dispatch workspace move name:nine # Move current window to workspace "nine"
bind = $META_KEY SHIFT, 0, exec, dotf dispatch workspace move name:ten # Move current window to workspace "ten"

# --- Swap Workspace keybind ---
bind = $META_KEY ALT, 1, exec, dotf dispatch swapworkspace name:one # Swap current workspace tag with tag "one"
bind = $META_KEY ALT, 2, exec, dotf dispatch swapworkspace name:two # Swap current workspace tag with tag "two"
bind = $META_KEY ALT, 3, exec, dotf dispatch swapworkspace name:three # Swap current workspace tag with tag "three"
bind = $META_KEY ALT, 4, exec, dotf dispatch swapworkspace name:four # Swap current workspace tag with tag "four"
bind = $META_KEY ALT, 5, exec, dotf dispatch swapworkspace name:five # Swap current workspace tag with tag "five"
bind = $META_KEY ALT, 6, exec, dotf dispatch swapworkspace name:six # Swap current workspace tag with tag "six"
bind = $META_KEY ALT, 7, exec, dotf dispatch swapworkspace name:seven # Swap current workspace tag with tag "seven"
bind = $META_KEY ALT, 8, exec, dotf dispatch swapworkspace name:eight # Swap current workspace tag with tag "eight"
bind = $META_KEY ALT, 9, exec, dotf dispatch swapworkspace name:nine # Swap current workspace tag with tag "nine"
bind = $META_KEY ALT, 0, exec, dotf dispatch swapworkspace name:ten # Swap current workspace tag with tag "ten"

# --- Mouse ---
bindm = $META_KEY, mouse:272, movewindow # Drag window (Mouse)
bindm = $META_KEY, mouse:273, resizewindow # Resize window using mouse
